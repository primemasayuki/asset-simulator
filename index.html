<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資産取り崩しシミュレーター</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg3: #efefec;
      --text: #1a1a18;
      --text2: #5a5a56;
      --text3: #9a9a94;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --success-bg: #eaf3de;
      --success-text: #3b6d11;
      --danger-bg: #fcebeb;
      --danger-text: #a32d2d;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c;
        --bg2: #2a2a27;
        --bg3: #323230;
        --text: #e8e8e2;
        --text2: #9a9a94;
        --text3: #6a6a64;
        --border: rgba(255,255,255,0.12);
        --border2: rgba(255,255,255,0.22);
        --success-bg: #1a3010;
        --success-text: #97c459;
        --danger-bg: #2e1010;
        --danger-text: #f09595;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg3);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    header {
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: 18px 24px;
    }

    header h1 {
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
    }

    header p {
      font-size: 13px;
      color: var(--text2);
      margin-top: 2px;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 0;
      min-height: calc(100vh - 61px);
    }

    .sidebar {
      background: var(--bg);
      border-right: 0.5px solid var(--border);
      padding: 20px;
      overflow-y: auto;
      height: calc(100vh - 61px);
      position: sticky;
      top: 0;
    }

    .main {
      padding: 20px;
      overflow-y: auto;
    }

    .section-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--text3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .divider { height: 0.5px; background: var(--border); margin: 18px 0; }

    .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .input-group label { font-size: 12px; color: var(--text2); }
    .input-group input[type=number],
    .input-group input[type=text] {
      font-size: 14px;
      padding: 8px 10px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border2);
      background: var(--bg);
      color: var(--text);
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-group input:focus { border-color: #378ADD; }

    .period-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }

    .period-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      border-left-width: 3px;
    }

    .period-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .period-label { font-size: 13px; font-weight: 500; color: var(--text); }
    .period-range { font-size: 12px; color: var(--text2); margin-left: 8px; }

    .period-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: var(--text3);
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
    }
    .del-btn:hover { color: var(--danger-text); background: var(--danger-bg); }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text2);
      background: var(--bg2);
      border: 0.5px dashed var(--border2);
      border-radius: var(--radius-md);
      padding: 9px 14px;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      margin-bottom: 4px;
    }
    .add-btn:hover { background: var(--bg); border-color: #378ADD; color: var(--text); }

    .income-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }

    .income-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-left: 3px solid #1D9E75;
      border-radius: var(--radius-md);
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 8px;
      align-items: end;
    }

    .income-empty {
      font-size: 12px;
      color: var(--text3);
      padding: 8px 0;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .metric {
      background: var(--bg2);
      border-radius: var(--radius-md);
      padding: 12px 14px;
    }
    .metric .mlabel { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .metric .mval { font-size: 22px; font-weight: 500; color: var(--text); }
    .metric .munit { font-size: 13px; font-weight: 400; }
    .metric .msub { font-size: 11px; color: var(--text3); margin-top: 2px; }

    .badge {
      display: inline-block;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: var(--radius-md);
      margin-bottom: 12px;
    }
    .badge-ok { background: var(--success-bg); color: var(--success-text); }
    .badge-danger { background: var(--danger-bg); color: var(--danger-text); }

    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      font-size: 12px;
      color: var(--text2);
    }
    .legend span { display: flex; align-items: center; gap: 4px; }
    .ld { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    .chart-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 18px;
    }

    .chart-wrap { position: relative; width: 100%; height: 320px; }

    .table-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .table-scroll { overflow-x: auto; }

    table { width: 100%; font-size: 13px; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 10px 14px;
      font-weight: 500;
      font-size: 11px;
      color: var(--text2);
      border-bottom: 0.5px solid var(--border);
      background: var(--bg2);
      white-space: nowrap;
    }
    td {
      padding: 8px 14px;
      border-bottom: 0.5px solid var(--border);
      color: var(--text);
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg2); }
    .td-period { font-size: 11px; }
    .depleted { color: var(--danger-text) !important; font-weight: 500; }
    .income-cell { color: var(--success-text); font-weight: 500; }

    .error-msg {
      font-size: 12px;
      color: var(--danger-text);
      padding: 8px 12px;
      background: var(--danger-bg);
      border-radius: var(--radius-md);
      margin-bottom: 10px;
    }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { height: auto; position: static; border-right: none; border-bottom: 0.5px solid var(--border); }
      .metrics { grid-template-columns: 1fr 1fr; }
      .income-card { grid-template-columns: 1fr 1fr; }
      .income-card .input-group:last-of-type { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>

<header>
  <h1>資産取り崩しシミュレーター</h1>
  <p>期間別の運用利率・月額取り崩しを設定し、資産推移をシミュレーション</p>
</header>

<div class="layout">
  <aside class="sidebar">
    <p class="section-title">基本設定</p>
    <div class="input-group">
      <label>初期資産（万円）</label>
      <input type="number" id="initAsset" value="10000" min="100" max="1000000" step="100">
    </div>

    <div class="divider"></div>

    <p class="section-title">期間別設定</p>
    <div class="period-list" id="periodList"></div>
    <button class="add-btn" onclick="addPeriod()">＋ 期間を追加</button>

    <div class="divider"></div>

    <p class="section-title">特別収入（一時金）</p>
    <div class="income-list" id="incomeList"></div>
    <button class="add-btn" onclick="addIncome()">＋ 特別収入を追加</button>
  </aside>

  <main class="main">
    <div id="errorMsg"></div>
    <div id="statusBadge" class="badge badge-ok">計算中...</div>
    <div class="metrics" id="metrics"></div>

    <div class="chart-card">
      <div class="legend" id="legend"></div>
      <div class="chart-wrap"><canvas id="chart"></canvas></div>
    </div>

    <p class="section-title" style="margin-bottom:10px">年次シミュレーション</p>
    <div class="table-card">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>年齢</th>
              <th>期間</th>
              <th>特別収入（万円）</th>
              <th>資産残高（万円）</th>
              <th>月額取り崩し（万円）</th>
              <th>運用利率</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
  let chartInstance = null;
  let periodId = 0;
  let incomeId = 0;
  const COLORS = ['#378ADD','#1D9E75','#BA7517','#993356','#534AB7','#639922'];

  let periods = [
    { id: periodId++, fromAge: 50, toAge: 65, returnRate: 4, monthlyWithdraw: 90 },
    { id: periodId++, fromAge: 65, toAge: 85, returnRate: 2, monthlyWithdraw: 50 },
  ];
  let incomes = [];

  function renderPeriods() {
    document.getElementById('periodList').innerHTML = periods.map((p, i) => `
      <div class="period-card" style="border-left-color:${COLORS[i % COLORS.length]}">
        <div class="period-header">
          <div>
            <span class="period-label">期間 ${i + 1}</span>
            <span class="period-range">${p.fromAge}歳 〜 ${p.toAge}歳</span>
          </div>
          ${periods.length > 1 ? `<button class="del-btn" onclick="removePeriod(${p.id})">✕</button>` : ''}
        </div>
        <div class="period-grid">
          <div class="input-group">
            <label>開始年齢</label>
            <input type="number" value="${p.fromAge}" min="20" max="100" step="1" oninput="updatePeriod(${p.id},'fromAge',+this.value)">
          </div>
          <div class="input-group">
            <label>終了年齢</label>
            <input type="number" value="${p.toAge}" min="21" max="120" step="1" oninput="updatePeriod(${p.id},'toAge',+this.value)">
          </div>
          <div class="input-group">
            <label>運用利率（%/年）</label>
            <input type="number" value="${p.returnRate}" min="0" max="20" step="0.1" oninput="updatePeriod(${p.id},'returnRate',+this.value)">
          </div>
          <div class="input-group">
            <label>月額取り崩し（万円）</label>
            <input type="number" value="${p.monthlyWithdraw}" min="0" max="9999" step="1" oninput="updatePeriod(${p.id},'monthlyWithdraw',+this.value)">
          </div>
        </div>
      </div>
    `).join('');
  }

  function renderIncomes() {
    const el = document.getElementById('incomeList');
    if (incomes.length === 0) {
      el.innerHTML = '<p class="income-empty">特別収入はまだ登録されていません</p>';
      return;
    }
    el.innerHTML = incomes.map(inc => `
      <div class="income-card">
        <div class="input-group">
          <label>受取年齢</label>
          <input type="number" value="${inc.age}" min="20" max="120" step="1" oninput="updateIncome(${inc.id},'age',+this.value)">
        </div>
        <div class="input-group">
          <label>金額（万円）</label>
          <input type="number" value="${inc.amount}" min="1" max="999999" step="100" oninput="updateIncome(${inc.id},'amount',+this.value)">
        </div>
        <div class="input-group">
          <label>内容（任意）</label>
          <input type="text" value="${inc.label}" placeholder="例：不動産売却" oninput="updateIncome(${inc.id},'label',this.value)">
        </div>
        <button class="del-btn" onclick="removeIncome(${inc.id})" style="margin-bottom:2px">✕</button>
      </div>
    `).join('');
  }

  function addPeriod() {
    const last = periods[periods.length - 1];
    periods.push({ id: periodId++, fromAge: last.toAge, toAge: last.toAge + 10, returnRate: 3, monthlyWithdraw: 30 });
    renderPeriods(); simulate();
  }
  function removePeriod(id) {
    if (periods.length <= 1) return;
    periods = periods.filter(p => p.id !== id);
    renderPeriods(); simulate();
  }
  function updatePeriod(id, key, val) {
    const p = periods.find(p => p.id === id);
    if (p) { p[key] = val; simulate(); }
  }

  function addIncome() {
    const sorted = [...periods].sort((a, b) => a.fromAge - b.fromAge);
    const defaultAge = sorted[0] ? sorted[0].fromAge + 5 : 60;
    incomes.push({ id: incomeId++, age: defaultAge, amount: 1000, label: '不動産売却' });
    renderIncomes(); simulate();
  }
  function removeIncome(id) {
    incomes = incomes.filter(i => i.id !== id);
    renderIncomes(); simulate();
  }
  function updateIncome(id, key, val) {
    const inc = incomes.find(i => i.id === id);
    if (inc) { inc[key] = val; simulate(); }
  }

  function validate() {
    const msgs = [];
    const sorted = [...periods].sort((a, b) => a.fromAge - b.fromAge);
    for (let i = 0; i < sorted.length; i++) {
      const p = sorted[i];
      if (p.fromAge >= p.toAge) msgs.push(`期間${i+1}: 開始年齢は終了年齢より小さくしてください`);
      if (i > 0 && sorted[i-1].toAge !== p.fromAge) {
        msgs.push(`期間${i}と期間${i+1}の年齢が連続していません（${sorted[i-1].toAge}歳 → ${p.fromAge}歳）`);
      }
    }
    return msgs;
  }

  function simulate() {
    const initAsset = parseFloat(document.getElementById('initAsset').value) || 10000;
    const errEl = document.getElementById('errorMsg');
    const errs = validate();
    if (errs.length) {
      errEl.innerHTML = errs.map(e => `<div class="error-msg">${e}</div>`).join('');
      return;
    }
    errEl.innerHTML = '';

    const sorted = [...periods].sort((a, b) => a.fromAge - b.fromAge);
    const startAge = sorted[0].fromAge;
    const endAge = sorted[sorted.length - 1].toAge;

    const incomeMap = {};
    for (const inc of incomes) {
      if (!incomeMap[inc.age]) incomeMap[inc.age] = [];
      incomeMap[inc.age].push(inc);
    }

    let asset = initAsset;
    let depletedAge = null;
    const rows = [];

    for (const period of sorted) {
      const monthlyRate = Math.pow(1 + period.returnRate / 100, 1/12) - 1;
      const pidx = sorted.indexOf(period);

      for (let age = period.fromAge; age < period.toAge; age++) {
        const incomeThisYear = (incomeMap[age] || []).reduce((s, i) => s + i.amount, 0);
        const incomeItems = incomeMap[age] || [];
        if (incomeThisYear > 0) asset += incomeThisYear;

        for (let m = 0; m < 12; m++) {
          asset = asset * (1 + monthlyRate) - period.monthlyWithdraw;
          if (asset <= 0 && depletedAge === null) depletedAge = age + (m + 1) / 12;
          asset = Math.max(0, asset);
        }

        rows.push({
          age: age + 1,
          asset: Math.round(asset),
          monthlyWithdraw: period.monthlyWithdraw,
          returnRate: period.returnRate,
          periodLabel: `${period.fromAge}〜${period.toAge}歳`,
          periodIdx: pidx,
          incomeThisYear,
          incomeItems
        });
      }
    }

    const finalAsset = rows.length ? rows[rows.length - 1].asset : 0;
    const totalWithdrawn = rows.reduce((s, r) => s + r.monthlyWithdraw * 12, 0);
    const totalIncome = incomes.reduce((s, i) => s + i.amount, 0);

    const badge = document.getElementById('statusBadge');
    if (depletedAge) {
      badge.textContent = `警告：${Math.floor(depletedAge)}歳ごろに資産が枯渇します`;
      badge.className = 'badge badge-danger';
    } else {
      badge.textContent = `${endAge}歳まで資産を維持できます`;
      badge.className = 'badge badge-ok';
    }

    document.getElementById('metrics').innerHTML = `
      <div class="metric">
        <div class="mlabel">最終資産残高</div>
        <div class="mval">${finalAsset.toLocaleString()}<span class="munit"> 万円</span></div>
        <div class="msub">${endAge}歳時点</div>
      </div>
      <div class="metric">
        <div class="mlabel">総取り崩し額</div>
        <div class="mval">${totalWithdrawn.toLocaleString()}<span class="munit"> 万円</span></div>
        <div class="msub">${endAge - startAge}年間合計</div>
      </div>
      <div class="metric">
        <div class="mlabel">特別収入合計</div>
        <div class="mval">${totalIncome.toLocaleString()}<span class="munit"> 万円</span></div>
        <div class="msub">${incomes.length}件</div>
      </div>
    `;

    document.getElementById('legend').innerHTML = [
      ...sorted.map((p, i) => `<span><span class="ld" style="background:${COLORS[i%COLORS.length]}99"></span>期間${i+1}（${p.fromAge}〜${p.toAge}歳）</span>`),
      `<span><span class="ld" style="background:#D85A30"></span>月額取り崩し</span>`,
      incomes.length > 0 ? `<span><span class="ld" style="background:#1D9E75"></span>特別収入</span>` : ''
    ].join('');

    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
    const tickColor = isDark ? '#6a6a64' : '#9a9a94';

    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(document.getElementById('chart'), {
      type: 'bar',
      data: {
        labels: rows.map(r => `${r.age}歳`),
        datasets: [
          {
            label: '資産残高',
            data: rows.map(r => r.asset),
            backgroundColor: rows.map(r => COLORS[r.periodIdx % COLORS.length] + '99'),
            borderWidth: 0,
            order: 3,
            yAxisID: 'y'
          },
          {
            label: '月額取り崩し',
            data: rows.map(r => r.monthlyWithdraw),
            type: 'line',
            borderColor: '#D85A30',
            backgroundColor: 'rgba(216,90,48,0.07)',
            borderWidth: 2,
            pointRadius: 0,
            stepped: true,
            fill: true,
            order: 2,
            yAxisID: 'y2'
          },
          {
            label: '特別収入',
            data: rows.map(r => r.incomeThisYear > 0 ? r.asset : null),
            type: 'scatter',
            backgroundColor: '#1D9E75',
            borderColor: isDark ? '#1e1e1c' : '#ffffff',
            borderWidth: 2,
            pointRadius: rows.map(r => r.incomeThisYear > 0 ? 8 : 0),
            pointStyle: 'triangle',
            order: 1,
            yAxisID: 'y'
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: ctx => `${ctx[0].label}（${rows[ctx[0].dataIndex].periodLabel}）`,
              label: ctx => {
                if (ctx.dataset.label === '資産残高') return `資産残高: ${Math.round(ctx.raw).toLocaleString()}万円`;
                if (ctx.dataset.label === '月額取り崩し') return `月額取り崩し: ${Math.round(ctx.raw).toLocaleString()}万円`;
                return null;
              },
              afterBody: ctx => {
                const row = rows[ctx[0].dataIndex];
                if (!row.incomeItems.length) return [];
                return row.incomeItems.map(i => `特別収入: +${i.amount.toLocaleString()}万円${i.label ? '（' + i.label + '）' : ''}`);
              }
            }
          }
        },
        scales: {
          x: {
            ticks: { autoSkip: true, maxTicksLimit: 12, font: { size: 11 }, color: tickColor },
            grid: { display: false }
          },
          y: {
            position: 'left',
            ticks: { font: { size: 11 }, color: tickColor, callback: v => `${Math.round(v/100)}百万` },
            grid: { color: gridColor }
          },
          y2: {
            position: 'right',
            ticks: { font: { size: 11 }, color: tickColor, callback: v => `${v}万` },
            grid: { display: false }
          }
        }
      }
    });

    document.getElementById('tableBody').innerHTML = rows.map(r => `
      <tr>
        <td>${r.age}歳</td>
        <td class="td-period" style="color:${COLORS[r.periodIdx%COLORS.length]}">${r.periodLabel}</td>
        <td class="${r.incomeThisYear > 0 ? 'income-cell' : ''}">${r.incomeThisYear > 0 ? '+' + r.incomeThisYear.toLocaleString() + (r.incomeItems[0]?.label ? '（' + r.incomeItems.map(i=>i.label).join('・') + '）' : '') : '—'}</td>
        <td class="${r.asset <= 0 ? 'depleted' : ''}">${r.asset.toLocaleString()}</td>
        <td>${r.monthlyWithdraw.toLocaleString()}</td>
        <td>${r.returnRate}%</td>
      </tr>
    `).join('');
  }

  document.getElementById('initAsset').addEventListener('input', simulate);
  renderPeriods();
  renderIncomes();
  simulate();
